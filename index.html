<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>私の部屋が映画になったら？ | Ohouse</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3.4.5/dist/dom-to-image-more.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #F0F4F8; font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }

    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; }

    #screen-upload { align-items: center; justify-content: center; padding: 24px; }
    .upload-card { width: 100%; max-width: 420px; background: white; border-radius: 20px; box-shadow: 0 2px 20px rgba(0,0,0,0.07); overflow: hidden; }
    .upload-title { padding: 28px 24px 20px; }
    .upload-title h1 { font-size: 32px; font-weight: 900; line-height: 1.2; color: #575757; margin-bottom: 8px; }
    .upload-title h1 span { color: #00A1FF; }
    .upload-title p { font-size: 14px; color: rgba(87,87,87,0.45); line-height: 1.6; }
    .divider { height: 1px; border-top: 1.5px dashed rgba(0,0,0,0.1); margin: 0 16px; }
    .upload-area-wrap { padding: 20px 16px; }
    .upload-area { width: 100%; background: #F4F6F8; border-radius: 12px; cursor: pointer; min-height: 180px; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: background 0.2s; }
    .upload-area:hover { background: #ECF1F5; }
    .upload-placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px; }
    .upload-placeholder .main { font-size: 15px; font-weight: 600; color: rgba(87,87,87,0.6); }
    .upload-placeholder .sub { font-size: 12px; color: rgba(87,87,87,0.35); }
    #preview-img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 12px; display: none; }
    .upload-btn-wrap { padding: 16px; }
    #btn-analyze { width: 100%; padding: 18px; background: #E8EEF3; color: #B0BEC5; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: not-allowed; font-family: inherit; transition: all 0.2s; }
    #btn-analyze.ready { background: #00A1FF; color: white; cursor: pointer; }

    #screen-loading { flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 40px; text-align: center; }
    .loading-icon { width: 80px; height: 80px; background: white; border-radius: 50%; box-shadow: 0 6px 24px rgba(0,161,255,0.18); display: flex; align-items: center; justify-content: center; }
    #loading-msg { font-size: 18px; font-weight: 700; color: #575757; }
    .loading-sub { font-size: 13px; color: rgba(87,87,87,0.45); }
    .dots { display: flex; gap: 6px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #00A1FF; animation: dotb 1s infinite; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dotb { 0%,80%,100%{transform:scale(0.6);opacity:0.3} 40%{transform:scale(1.1);opacity:1} }

    #screen-error { flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 40px; text-align: center; }
    .err-emoji { font-size: 36px; }
    .err-title { font-size: 16px; font-weight: 700; color: #575757; }
    #err-msg { font-size: 12px; color: #999; word-break: break-all; max-width: 300px; line-height: 1.6; }
    #btn-retry { padding: 12px 28px; background: #00A1FF; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

    #screen-result { flex-direction: column; background: #F0F4F8; }
    .result-inner { max-width: 420px; width: 100%; margin: 0 auto; padding: 20px 16px 60px; }
    .ticket { background: white; color: #575757; border-radius: 16px; box-shadow: 0 2px 20px rgba(0,0,0,0.07); overflow: hidden; animation: fadeUp 0.5s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

    .ticket-header { padding: 14px 18px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px dashed rgba(0,0,0,0.1); }
    .ticket-logo { display: flex; align-items: center; gap: 7px; }
    .logo-icon { width: 20px; height: 20px; background: #00A1FF; border-radius: 5px; display: flex; align-items: center; justify-content: center; }
    .logo-text { font-size: 14px; font-weight: 800; }
    .ticket-label { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 600; color: #00A1FF; letter-spacing: 0.1em; white-space: nowrap; flex-shrink: 0; display: inline-block; }

    .poster { position: relative; height: 320px; overflow: hidden; }
    .poster img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.55) saturate(1.2); display: block; }
    .poster-gradient { position: absolute; inset: 0; background: linear-gradient(to top, rgba(8,8,16,0.92) 0%, rgba(8,8,16,0.2) 55%, transparent 100%); }
    .poster-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 18px 20px 20px; }
    .genre-badge { display: inline-flex; align-items: center; background: #00A1FF; color: white; font-size: 9px; font-weight: 700; padding: 4px 10px; border-radius: 3px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 10px; }
    .movie-title { font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif; font-size: 28px; font-weight: 900; color: white; line-height: 1.2; letter-spacing: -0.5px; }
    .movie-tagline { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 8px; line-height: 1.6; }

    .perforation { display: flex; align-items: center; margin: 0 -1px; }
    .perf-notch { width: 14px; height: 14px; border-radius: 50%; background: #F0F4F8; flex-shrink: 0; }
    .perf-line { flex: 1; border-top: 1px dashed rgba(0,0,0,0.1); }

    .info-grid { padding: 16px 20px 14px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px 8px; border-bottom: 1px dashed rgba(0,0,0,0.1); }
    .info-label { font-size: 8px; font-family: 'DM Mono', monospace; color: rgba(87,87,87,0.4); letter-spacing: 0.12em; margin-bottom: 3px; }
    .info-value { font-size: 11px; font-weight: 700; color: #1a1a1a; line-height: 1.3; }

    .vibe-section { padding: 14px 20px; border-bottom: 1px dashed rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px; flex-wrap: nowrap; }
    .section-label { font-size: 11px; font-family: 'DM Mono', monospace; color: #666; letter-spacing: 0.08em; white-space: nowrap; flex-shrink: 0; font-weight: 600; }
    .section-label-block { font-size: 11px; font-family: 'DM Mono', monospace; color: #666; letter-spacing: 0.08em; margin-bottom: 10px; font-weight: 600; }
    .traits { display: flex; flex-wrap: nowrap; gap: 6px; overflow: hidden; }
    .trait-tag { font-size: 11px; font-weight: 600; background: #EEF7FF; color: #00A1FF; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .trait-desc { font-size: 12px; color: #1a1a1a; line-height: 1.65; word-wrap: break-word; overflow-wrap: break-word; word-break: keep-all; }

    .cast-section { padding: 14px 20px; border-bottom: 1px dashed rgba(0,0,0,0.1); }
    .cast-traits { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .cast-desc { font-size: 12px; color: #1a1a1a; line-height: 1.65; word-wrap: break-word; overflow-wrap: break-word; text-align: justify; }

    .scenes-section { padding: 14px 20px; border-bottom: 1px dashed rgba(0,0,0,0.1); }
    .scene-item { display: flex; align-items: flex-start; gap: 7px; margin-bottom: 5px; width: 100%; }
    .scene-arrow { color: #00A1FF; font-size: 12px; margin-top: 2px; flex-shrink: 0; }
    .scene-text { font-size: 12px; color: #1a1a1a; line-height: 1.6; word-wrap: break-word; overflow-wrap: break-word; word-break: keep-all; min-width: 0; flex: 1; }

    .barcode-section { padding: 12px 20px 14px; }
    .barcode-num { font-family: 'DM Mono', monospace; font-size: 9px; color: rgba(87,87,87,0.3); text-align: center; letter-spacing: 0.22em; margin-top: 4px; }

    .reco-section { padding: 20px; background: white; border-radius: 16px; box-shadow: 0 2px 20px rgba(0,0,0,0.07); margin-top: 16px; animation: fadeUp 0.5s 0.12s ease both; }
    .reco-title { font-size: 16px; font-weight: 800; color: #1a1a1a; margin-bottom: 6px; }
    .reco-sub { font-size: 12px; color: #333; line-height: 1.6; margin-bottom: 14px; }
    .reco-cards { display: flex; flex-direction: column; gap: 10px; }
    .reco-card { display: flex; align-items: center; justify-content: space-between; background: #EEF7FF; border: none; border-radius: 12px; padding: 14px 16px; text-decoration: none; color: inherit; transition: background 0.2s; }
    .reco-card:hover { background: #DCF0FF; }
    .reco-card-name { font-size: 13px; font-weight: 700; color: #00A1FF; margin-bottom: 2px; }
    .reco-card-sub { font-size: 11px; color: #999; }
    .reco-arrow { width: 28px; height: 28px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    #btn-save-ticket { width: 100%; margin-top: 16px; padding: 14px 0; background: #00A1FF; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; color: white; cursor: pointer; font-family: inherit; transition: background 0.2s; }
    #btn-save-ticket:hover { background: #0090e6; }
    #btn-reset { width: 100%; margin-top: 20px; padding: 14px 0; background: white; border: 1px solid #E5E5E5; border-radius: 12px; font-size: 14px; font-weight: 700; color: #aaa; cursor: pointer; font-family: inherit; transition: background 0.2s; }
    #btn-reset:hover { background: #EEF7FF; }
    .scallop svg { display: block; width: 100%; }
  </style>
</head>

<!-- UPLOAD -->
<div id="screen-upload" class="screen active">
  <div class="upload-card">
    <div class="upload-title">
      <h1>私の部屋が<br><span>映画</span>になったら？</h1>
      <p>お部屋の写真1枚で映画チケットを作ろう</p>
    </div>
    <div class="divider"></div>
    <div class="upload-area-wrap">
      <div class="upload-area" id="upload-area">
        <div class="upload-placeholder" id="upload-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="#AAAAAA" stroke-width="1.5" width="36" height="36">

      <input type="file" id="file-input" accept="image/*" style="display:none" />
    </div>
    <div class="divider"></div>
    <div class="upload-btn-wrap">
      <button id="btn-analyze" disabled>チケットを発券する</button>

</div>

  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<!-- ERROR -->
<div id="screen-error" class="screen">
  <div class="err-emoji">😅</div>
  <div class="err-title">エラーが発生しました</div>
  <div id="err-msg"></div>
  <button id="btn-retry">もう一度試す</button>
</div>

        <div><div class="info-label">YEAR</div><div class="info-value" id="result-year">—</div></div>

        <div class="section-label">VIBE</div>

        <div class="section-label-block">CAST — この部屋に住む主人公は</div>

        <div class="section-label-block">KEY SCENES</div>

<script>
  const BASE = "https://www.ohouse.com/ja-JP/store";
  const GC = {
    "ロマンス": [
      { n: "ソファ", s: "やわらかい空間づくりに", u: BASE + "/category?category_id=1124" },
      { n: "ファブリック", s: "カーテン・クッションなど", u: BASE + "/category?category_id=1143" },
      { n: "インテリア小物・照明", s: "雰囲気を彩るアイテム", u: BASE + "/category?category_id=1128" },
    ],
    "ヒーリング": [
      { n: "ソファ", s: "くつろぎの時間のために", u: BASE + "/category?category_id=1124" },
      { n: "生活雑貨", s: "毎日が少し楽しくなる", u: BASE + "/category?category_id=1129" },
      { n: "インテリア小物・照明", s: "癒しの空間に", u: BASE + "/category?category_id=1128" },
    ],
    "ドラマ": [

      { n: "収納家具", s: "整えられた空間が主役", u: BASE + "/category?category_id=1125" },
      { n: "ベッド", s: "物語のはじまりに", u: BASE + "/category?category_id=1132" },
    ],
    "ミステリー": [
      { n: "インテリア小物・照明", s: "ムードのある照明を", u: BASE + "/category?category_id=1128" },
      { n: "収納家具", s: "秘密を隠すのに", u: BASE + "/category?category_id=1125" },
      { n: "椅子", s: "考える椅子が似合う", u: BASE + "/category?category_id=1127" },
    ],
    "ファンタジー": [
      { n: "インテリア小物・照明", s: "非日常を演出する", u: BASE + "/category?category_id=1128" },
      { n: "ファブリック", s: "色と質感で世界観を", u: BASE + "/category?category_id=1143" },
      { n: "生活雑貨", s: "ユニークなアイテムを", u: BASE + "/category?category_id=1129" },
    ],
    "アートハウス": [
      { n: "インテリア小物・照明", s: "アートな照明で演出", u: BASE + "/category?category_id=1128" },
      { n: "椅子", s: "個性的な一脚", u: BASE + "/category?category_id=1127" },
      { n: "テーブル・机", s: "こだわりの机を", u: BASE + "/category?category_id=1126" },
    ],
  };
  const DC = [
    { n: "ソファ", s: "くつろぎのアイテム", u: BASE + "/category?category_id=1124" },
    { n: "インテリア小物・照明", s: "雰囲気をつくるアイテム", u: BASE + "/category?category_id=1128" },
    { n: "生活雑貨", s: "毎日を彩るアイテム", u: BASE + "/category?category_id=1129" },
  ];

  const JP_MOVIES = [
    "かもめ食堂","めがね","南極料理人","リトル・フォレスト","海街diary",
    "そして父になる","万引き家族","歩いても 歩いても","海よりもまだ深く","真実",
    "東京物語","秋刀魚の味","晩春","麦秋","お早よう",
    "千と千尋の神隠し","となりのトトロ","もののけ姫","風の谷のナウシカ","天空の城ラピュタ",
    "ハウルの動く城","崖の上のポニョ","魔女の宅急便","耳をすませば","おもひでぽろぽろ",
    "君の名は。","天気の子","すずめの戸締まり","言の葉の庭","秒速5センチメートル",
    "時をかける少女","サマーウォーズ","バケモノの子","竜とそばかすの姫","未来のミライ",
    "ドライブ・マイ・カー","花束みたいな恋をした","愛がなんだ","勝手にふるえてろ","百円の恋",
    "リリイ・シュシュのすべて","誰も知らない","空気人形","ワンダフルライフ","幻の光",
    "怒り","告白","悪人","凶悪","冷たい熱帯魚",
    "おくりびと","永い言い訳","蜜蜂と遠雷","舟を編む","ちひろさん",
    "深夜食堂","孤独のグルメ","パーフェクトデイズ","ALWAYS 三丁目の夕日","男はつらいよ",
    "鎌倉ものがたり","夏への扉","思い出のマーニー","コクリコ坂から","借りぐらしのアリエッティ",
    "湯を沸かすほどの熱い愛","そこのみにて光輝く","淵に立つ","ゆれる","ディア・ドクター",
    "七人の侍","用心棒","乱","影武者","羅生門",
    "座頭市","たそがれ清兵衛","壬生義士伝","武士の一分","隠し剣 鬼の爪",
    "リング","呪怨","仄暗い水の底から","カメラを止めるな!","サバイバルファミリー",
    "万引き家族","ベイビーわるきゅーれ","キングダム","るろうに剣心","銀魂",
    "新聞記者","Fukushima 50","日本のいちばん長い日","シン・ゴジラ","シン・ウルトラマン",
    "余命10年","ぼくは明日、昨日のきみとデートする","君の膵臓をたべたい","四月は君の嘘","orange"
  ];

  const PROMPT =
    "あなたは優しい映画評論家です。この部屋の写真を分析して、以下のJSONのみで答えてください。JSON以外のテキストは不要です。\n\n" +
    "ルール:\n" +
    "- 重要: titleは必ず以下の映画リストからお部屋の雰囲気に最も合うものを選んでください。自分で作らないでください。\n" +
    "- genre: 選んだ映画の実際のジャンル (ロマンス/ミステリー/ファンタジー/ドラマ/ヒーリング/アートハウス/アクション/コメディ/SF/スリラー のいずれか)\n" +
    "- year: 選んだ映画の実際の公開年\n" +
    "- tagline, traits, castTraits, castDesc, scenes: お部屋の写真の雰囲気と選んだ映画を結びつけて優しく書いてください\n" +
    "- シーン: 共感できるリアルなシーン。部屋に既にあるアイテムの推薦は禁止。\n" +
    "- すべての日本語テキストは自然な日本語で書いてください。\n" +
    "- 口調: ～ですね/～でしょう/～かもしれません のような優しく丁寧な口調。\n\n" +
    "映画リスト:\n" + JP_MOVIES.join(", ") + "\n\n" +
    '{"genre":"ジャンル","genreEmoji":"絵文字","title":"リストから選んだ映画タイトル","tagline":"部屋と映画を結ぶタグライン15~25文字","year":"実際の公開年","traits":["キーワード","キーワード","キーワード"],"castTraits":["性格","性格","性格","性格"],"castDesc":"この部屋の主人公の描写2~3文","scenes":["シーン1","シーン2","シーン3"]}';

  const BP = [1,2,1,1,3,1,1,2,1,3,1,1,2,1,1,3,2,1,1,2,1,3,1,1,2,1,2,1,3,1,1,2,1,1,3,1,2,1,1,2,3,1,1,2,1,3,1,1,2,1];

  let previewDataUrl = null, base64Data = null;

  const uploadArea = document.getElementById('upload-area');
  const fileInput  = document.getElementById('file-input');
  const previewImg = document.getElementById('preview-img');
  const placeholder = document.getElementById('upload-placeholder');
  const btnAnalyze  = document.getElementById('btn-analyze');

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
  }

  uploadArea.addEventListener('click', () => fileInput.click());
  uploadArea.addEventListener('dragover', e => e.preventDefault());
  uploadArea.addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
  document.getElementById('btn-retry').addEventListener('click', reset);
  document.getElementById('btn-reset').addEventListener('click', reset);
  btnAnalyze.addEventListener('click', startAnalysis);

  function handleFile(file) {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height, MAX = 1200;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const c = canvas.toDataURL('image/jpeg', 0.82);
        base64Data = c.split(',')[1];
        previewDataUrl = c;
        previewImg.src = c;
        previewImg.style.display = 'block';
        placeholder.style.display = 'none';
        btnAnalyze.disabled = false;
        btnAnalyze.classList.add('ready');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function startAnalysis() {
    showScreen('loading');
    const msgs = ['チケット印刷中...','ジャンル分析中...','主人公を探し中...','もうすぐ完了...'];
    let mi = 0;
    document.getElementById('loading-msg').textContent = msgs[0];
    const iv = setInterval(() => { mi = (mi+1)%msgs.length; document.getElementById('loading-msg').textContent = msgs[mi]; }, 1600);
    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'meta-llama/llama-4-scout-17b-16e-instruct',
          max_tokens: 1200,
          messages: [{ role: 'user', content: [
            { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + base64Data } },
            { type: 'text', text: PROMPT },
          ]}],
        }),
      });
      clearInterval(iv);
      const data = await res.json();
      if (!res.ok || !data.choices) { showError('APIエラー ' + res.status + ': ' + (data.error ? data.error.message : JSON.stringify(data).slice(0,100))); return; }
      const raw = data.choices[0].message.content || '';
      const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
      if (s < 0 || e < 0) { showError('JSONなし: ' + raw.slice(0,100)); return; }
      let parsed;
      try { parsed = JSON.parse(raw.slice(s, e+1).replace(/[\x00-\x1F\x7F]/g, ' ')); }
      catch(pe) { showError('パースエラー: ' + pe.message); return; }
      renderResult(parsed);
    } catch(err) {
      clearInterval(iv);
      showError(err.name + ': ' + err.message);
    }
  }

  function showError(msg) {
    document.getElementById('err-msg').textContent = msg;
    showScreen('error');
  }

  function renderResult(r) {
    const tNo = 'OH-' + (r.year||'2024') + '-' + (Math.floor(Math.random()*9000)+1000);
    document.getElementById('result-img').src = previewDataUrl;
    document.getElementById('result-genre-badge').textContent = (r.genreEmoji||'') + ' ' + (r.genre||'');
    document.getElementById('result-title').textContent = r.title||'';
    document.getElementById('result-tagline').textContent = r.tagline||'';
    document.getElementById('result-year').textContent = r.year||'—';
    document.getElementById('result-genre-text').textContent = r.genre||'—';
    document.getElementById('result-ticketno').textContent = tNo;
    document.getElementById('barcode-num').textContent = tNo;

    const traitsEl = document.getElementById('result-traits');
    traitsEl.innerHTML = '';
    (r.traits||[]).forEach(t => {
      const sp = document.createElement('span');
      sp.className = 'trait-tag'; sp.textContent = t;
      traitsEl.appendChild(sp);
    });

    const castTraitsEl = document.getElementById('result-cast-traits');
    castTraitsEl.innerHTML = '';
    (r.castTraits||[]).forEach(t => {
      const sp = document.createElement('span');
      sp.className = 'trait-tag'; sp.textContent = t;
      castTraitsEl.appendChild(sp);
    });
    document.getElementById('result-cast-desc').textContent = r.castDesc||'';

    const scenesEl = document.getElementById('result-scenes');
    scenesEl.innerHTML = '';
    (r.scenes||[]).forEach(sc => {
      scenesEl.innerHTML += '<div class="scene-item"><span class="scene-arrow">▸</span><span class="scene-text">' + sc + '</span></div>';
    });

    // Barcode
    const svg = document.getElementById('barcode-svg');
    svg.innerHTML = '';
    let x = 0;
    BP.forEach((w, i) => {
      if (i%2===0) {
        const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
        rect.setAttribute('x', x); rect.setAttribute('y', 0);
        rect.setAttribute('width', w*2.2); rect.setAttribute('height', 40);
        rect.setAttribute('fill','#575757'); rect.setAttribute('opacity','0.7');
        svg.appendChild(rect);
      }
      x += w*2.2;
    });
    svg.setAttribute('viewBox','0 0 '+x+' 40');

    const cats = GC[r.genre]||DC;
    const cardsEl = document.getElementById('reco-cards');
    cardsEl.innerHTML = '';
    cats.forEach(cat => {
      cardsEl.innerHTML += `
        <a class="reco-card" href="${cat.u}" target="_blank" rel="noopener noreferrer">
          <div>
            <div class="reco-card-name">${cat.n}</div>
            <div class="reco-card-sub">${cat.s}</div>
          </div>
          <div class="reco-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="#00A1FF" stroke-width="2.2" width="13" height="13"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </a>`;
    });

    showScreen('result');
  }

  document.getElementById('btn-save-ticket').addEventListener('click', async function() {
    const ticket = document.querySelector('.ticket');
    const btn = this;
    btn.textContent = '保存中...';
    btn.disabled = true;
    try {
      await document.fonts.ready;
      await new Promise(r => setTimeout(r, 200));
      const w = ticket.offsetWidth;
      const h = ticket.offsetHeight;
      const scale = 3;
      const svgDataUrl = await domtoimage.toSvg(ticket, {
        width: w,
        height: h,
        cacheBust: true
      });
      const img = new Image();
      img.width = w * scale;
      img.height = h * scale;
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = svgDataUrl;
      });
      const canvas = document.createElement('canvas');
      canvas.width = w * scale;
      canvas.height = h * scale;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, w * scale, h * scale);
      const dataUrl = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = 'ohouse-movie-ticket.png';
      link.href = dataUrl;
      link.click();
      btn.textContent = '保存完了！';
      setTimeout(() => { btn.textContent = 'チケット画像を保存する'; btn.disabled = false; }, 2000);
    } catch(e) {
      console.error('Save error:', e);
      btn.textContent = 'チケット画像を保存する';
      btn.disabled = false;
      alert('保存に失敗しました。もう一度お試しください。');
    }
  });

  function reset() {
    previewDataUrl = null; base64Data = null;
    previewImg.src = ''; previewImg.style.display = 'none';
    placeholder.style.display = 'flex';
    btnAnalyze.disabled = true; btnAnalyze.classList.remove('ready');
    fileInput.value = '';
    showScreen('upload');
  }
</script>
